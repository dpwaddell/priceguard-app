# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e85484e547bb60fe353592356a345ed1"
name = "PriceGuard"
application_url = "https://priceguard.sample-guard.com"
embedded = true
handle = "priceflow-app"

[webhooks]
api_version = "2026-04"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_customers,read_products,write_app_proxy"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://priceguard.sample-guard.com/auth/callback" ]

[app_preferences]
url = "https://priceguard.sample-guard.com/settings"

[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request"]
uri = "/webhooks/customers/data_request"

[[webhooks.subscriptions]]
compliance_topics = ["customers/redact"]
uri = "/webhooks/customers/redact"

[[webhooks.subscriptions]]
compliance_topics = ["shop/redact"]
uri = "/webhooks/shop/redact"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[app_proxy]
url = "https://priceguard.sample-guard.com/proxy"
prefix = "apps"
subpath = "priceguard"

[[extensions]]
handle = "priceguard-pricing"
type = "theme"
# blocks/priceguard-pricing.liquid          — target: section (product page block)
# blocks/priceguard-pricing-sitewide.liquid — target: body   (site-wide app embed)
